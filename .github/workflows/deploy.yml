name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Build frontend
        working-directory: apps/web
        run: npm install && npm run build
      - name: Deploy via SFTP (Hostinger)
        if: ${{ secrets.HOSTINGER_SFTP_HOST != '' }}
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.HOSTINGER_SFTP_HOST }}
          username: ${{ secrets.HOSTINGER_SFTP_USER }}
          password: ${{ secrets.HOSTINGER_SFTP_PASSWORD }}
          local_path: 'apps/web/dist/*'
          remote_path: ${{ secrets.HOSTINGER_SFTP_PATH }}
      - name: Skip note
        if: ${{ secrets.HOSTINGER_SFTP_HOST == '' }}
        run: echo "Secrets de deploy não configurados — deploy pulado."

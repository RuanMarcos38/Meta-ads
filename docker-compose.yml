version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestao_ads
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  api:
    build: { context: ., dockerfile: Dockerfile }
    ports: ["3333:3333"]
    env_file: apps/api/.env
    depends_on: [postgres]
volumes:
  pgdata:
